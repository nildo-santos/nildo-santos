name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

# ESSENCIAL: Garante permissão para o Action salvar a imagem no repositório
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Prepara o ambiente baixando o repositório
      - name: Checkout repo
        uses: actions/checkout@v3

      # Gera a cobrinha
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: nildo-santos
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Envia a imagem para a branch 'output'
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
